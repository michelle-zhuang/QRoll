name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

jobs:
  verify:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx astro check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
