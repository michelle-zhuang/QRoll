<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" width="100%" height="100%">
    <defs>
        <linearGradient id="checkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#D0F4DE" />
            <stop offset="50%" stop-color="#A9DEF9" />
            <stop offset="100%" stop-color="#E4C1F9" />
        </linearGradient>
    </defs>
    
    <!-- Outer ring of Q (Check-in target) -->
    <circle cx="246" cy="256" r="125" class="q-ring" stroke-width="44" stroke-linecap="round" />
    
    <!-- Checkmark (Roll call / success check) -->
    <path d="M 181 256 L 246 321 L 391 156" stroke="url(#checkGrad)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" />
    
    <style>
        .q-ring {
            stroke: #2F2738;
        }
        @media (prefers-color-scheme: dark) {
            .q-ring {
                stroke: #FFFDF9;
            }
        }
    </style>
</svg>
